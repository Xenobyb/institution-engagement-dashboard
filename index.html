<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0b1120 0%, #1a1f35 100%);
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #loading-container {
            text-align: center;
            animation: fadeInScale 0.5s ease-out forwards;
        }

        #loading-container h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }

        #loading-container p {
            font-size: 1.0625rem;
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(37, 99, 235, 0.2);
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        #fallback-paragraph {
            margin-top: 2rem;
            font-size: 0.9375rem;
            color: #94a3b8;
        }

        #fallback-paragraph a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
            transition: color 180ms ease;
        }

        #fallback-paragraph a:hover {
            color: #60a5fa;
            text-decoration: underline;
        }

        #fallback-paragraph a:focus {
            outline: 2px solid #2563eb;
            outline-offset: 2px;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <!-- Loading state: visible until redirect occurs -->
    <div id="loading-container">
        <h1 id="loading-title">Kejap, kak Suha tengan brew matcha :3</h1>
        <p id="loading-message">Brewing matcha...</p>
        <div class="loading-spinner"></div>
    </div>

    <!-- Fallback link: shown only if JavaScript AND meta-refresh both fail -->
    <p id="fallback-paragraph" hidden>
        If you are not redirected automatically, <a id="fallback-link" href="#">click here to continue</a>
    </p>

    <script>
        /**
         * APPLICATION LAUNCHER
         * 
         * This page serves as the root-level entry point for the application.
         * It is intentionally kept independent of any specific module implementation.
         * 
         * CONFIGURATION:
         * To change the default landing page, modify the DEFAULT_MODULE value below.
         * All other code will adapt automatically.
         */

        // ============================================================================
        // LAUNCHER CONFIGURATION - Change this to redirect to a different module
        // ============================================================================
        var LAUNCHER_CONFIG = {
            // Path to the default module/page to load
            // Currently: module-01-dashboard
            // To change: update this path to any module (e.g., './module-02-kpi-insights/index.html')
            DEFAULT_MODULE: './module-01-dashboard/index.html',

            // Page title (shown in browser tab)
            PAGE_TITLE: 'COE KPI Dashboard',

            // Loading message shown while redirecting
            LOADING_MESSAGE: 'Redirecting to COE KPI Dashboard'
        };
        // ============================================================================

        /**
         * Initialize launcher: set page title and update DOM elements
         * This ensures consistency between configuration and displayed content
         */
        function initializeLauncher() {
            document.title = LAUNCHER_CONFIG.PAGE_TITLE;
            document.getElementById('loading-title').textContent = 'Loading Application';
            document.getElementById('loading-message').textContent = LAUNCHER_CONFIG.LOADING_MESSAGE;

            var fallbackLink = document.getElementById('fallback-link');
            fallbackLink.href = LAUNCHER_CONFIG.DEFAULT_MODULE;
            fallbackLink.textContent = 'click here to continue';
        }

        /**
         * Execute redirect with multiple fallback mechanisms
         * Mechanism 1: JavaScript (highest priority, instant)
         * Mechanism 2: HTML meta-refresh (if JavaScript disabled)
         * Mechanism 3: Manual link (if both mechanisms fail)
         */
        function executeRedirect() {
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function() {
                    window.location.replace(LAUNCHER_CONFIG.DEFAULT_MODULE);
                });
            } else {
                window.location.replace(LAUNCHER_CONFIG.DEFAULT_MODULE);
            }
        }

        /**
         * Show fallback link if redirect mechanisms fail
         * Displays after 3 seconds to allow user manual navigation
         */
        function showFallbackLink() {
            setTimeout(function() {
                var fallback = document.getElementById('fallback-paragraph');
                if (fallback && fallback.hidden) {
                    fallback.hidden = false;
                }
            }, 3000);
        }

        // Initialize launcher with configuration
        initializeLauncher();

        // Set up meta-refresh as secondary redirect mechanism
        // (This is a backup if JavaScript is disabled)
        var metaRefresh = document.createElement('meta');
        metaRefresh.httpEquiv = 'refresh';
        metaRefresh.content = '0; url=' + LAUNCHER_CONFIG.DEFAULT_MODULE;
        document.head.appendChild(metaRefresh);

        // Primary redirect (JavaScript) with fallback
        executeRedirect();
        showFallbackLink();
    </script>
</body>
</html>
