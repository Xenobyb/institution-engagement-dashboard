<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../module-01-dashboard/style.css">
    <link rel="stylesheet" href="../components/sidebar.css">
    <script src="../components/sidebar.js"></script>
    <title>KPI Insights - Institution Engagement Dashboard</title>
</head>
<body>
    <div id="app-layout">
        <!-- Shared sidebar component mount -->
        <aside id="sidebar" aria-label="Dashboard sidebar"></aside>

        <main id="dashboard-content">
            <header id="dashboard-header">
                <div class="header-content">
                    <div class="header-title-group">
                        <h1>KPI Insights</h1>
                        <p>Detailed performance metrics and insights</p>
                    </div>
                </div>
            </header>

            <section id="content-placeholder" style="padding: var(--space-8); text-align: center; color: var(--color-text-muted);">
                <h2 style="color: var(--color-text); margin-bottom: var(--space-4);">Coming Soon</h2>
                <p>This module is under development. Navigate to other modules using the sidebar.</p>
            </section>
        </main>

        <footer id="dashboard-footer">
            <p class="footer-title">Institution Engagement Dashboard</p>
            <p class="footer-version">Version <span id="dashboard-version" class="footer-version-value">1.0</span></p>
        </footer>
    </div>
    <script src="config.js"></script>
</body>
</html>
